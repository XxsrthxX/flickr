<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F59E0B" />

    <!-- SEO -->
    <title>Flickr — Find Your Next Favourite</title>
    <meta name="description" content="Search millions of movies and TV shows instantly. Discover, explore and save your favourites with Flickr." />

    <!-- Open Graph (looks good when shared on LinkedIn etc) -->
    <meta property="og:title" content="Flickr — Find Your Next Favourite" />
    <meta property="og:description" content="Search millions of movies and TV shows instantly." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flickr-blush.vercel.app" />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flickr" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
